<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soonstone — Forecast Verification</title>
  <link rel="icon" type="image/svg+xml" href="/static/soonstone.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    :root {
      /* Dark theme — sunstone-after-dusk palette */
      --bg:            #0d1421;  /* deep navy, sits near CartoDB Dark Matter */
      --surface:       #142235;  /* header, cards */
      --surface-2:     #1a2b42;  /* popup-now bg */
      --surface-3:     #1f2f47;  /* neutral cell */
      --border:        #1e3a5f;  /* sky-tinted subtle border */
      --border-strong: #0ea5e9;  /* sky-500 emphasis */

      /* Brand (brighter on dark for parity with merLLM / lancellmot) */
      --blue:          #38bdf8;  /* sky-400 */
      --blue-bright:   #7dd3fc;  /* sky-300 */
      --yellow:        #fbbf24;  /* amber-400 — header stripe, AMD highlight */
      --yellow-soft:   #3a2806;  /* amber-950ish — AMD cell tint on dark */

      /* Text */
      --text:          #e0f2fe;  /* sky-100 */
      --text-muted:    #94a3b8;  /* slate-400 */

      /* Aviation flight categories (brightened-for-dark; matches map markers) */
      --cat-vfr:  #3fb950;
      --cat-mvfr: #58a6ff;
      --cat-ifr:  #ff7b7b;
      --cat-lifr: #d093ff;

      --radius:        8px;
      --font:          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    /* Header bar — fixed at top, overlays the map. Yellow top stripe is the
       brand thread (matches lancellmot's gold top-border convention). */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--yellow);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }
    header img {
      width: 36px; height: 36px;
      filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.55));
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    header h1 .accent { color: var(--blue); }

    /* Mode toggle (Aviation / Friendly) — segmented control in the header */
    .mode-toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-left: 12px;
    }
    .mode-toggle button {
      background: var(--surface);
      color: var(--text-muted);
      border: none;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
      letter-spacing: 0.02em;
    }
    .mode-toggle button.active {
      background: var(--surface-2);
      color: var(--text);
      box-shadow: inset 0 -2px 0 var(--yellow);
    }
    .mode-toggle button:hover:not(.active) { color: var(--text); }

    header .tagline {
      margin-left: 4px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    #map {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
    }

    /* Push Leaflet's top-left zoom control below the fixed header so it
       doesn't get hidden under the title bar. Header is ~52px tall plus
       the 3px amber stripe = ~55px; round up. */
    .leaflet-top.leaflet-left { top: 64px; }

    /* Match the Leaflet zoom control to the dark theme. */
    .leaflet-bar {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5) !important;
      border: 1px solid var(--border) !important;
    }
    .leaflet-bar a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .leaflet-bar a:hover {
      background: var(--surface-2) !important;
    }
    .leaflet-control-attribution {
      background: rgba(20, 34, 53, 0.85) !important;
      color: var(--text-muted) !important;
    }
    .leaflet-control-attribution a {
      color: var(--blue) !important;
    }
    .leaflet-control-layers {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5) !important;
    }
    .leaflet-control-layers-base label { color: var(--text); }
    .leaflet-control-layers-separator { border-top-color: var(--border) !important; }

    /* "Locate me" button matches Leaflet's zoom-bar visual language */
    .locate-control a {
      display: block; width: 30px; height: 30px;
      line-height: 30px; text-align: center;
      background: var(--surface) !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
      text-decoration: none;
      font-size: 16px;
    }
    .locate-control a:hover { background: var(--surface-2) !important; }
    .user-location-marker {
      width: 14px; height: 14px;
      background: var(--blue);
      border: 2px solid var(--surface);
      border-radius: 50%;
      box-shadow: 0 0 0 2px var(--blue-bright), 0 0 12px rgba(56, 189, 248, 0.6);
    }

    /* Toast for short-lived status messages (geolocation, satellite empty, etc.) */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      z-index: 2000;
      max-width: 360px;
    }
    .toast.toast-warn { border-color: var(--yellow); }
    .toast.toast-err  { border-color: var(--cat-ifr); }

    /* Consumer / friendly mode */
    .friendly-now {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 14px;
      align-items: center;
      padding: 10px 12px;
      background: var(--surface-2);
      border-left: 3px solid var(--yellow);
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .friendly-now-icon { font-size: 44px; line-height: 1; }
    .friendly-now-temp { font-size: 28px; font-weight: 600; color: var(--text); }
    .friendly-now-cond { color: var(--text-muted); font-size: 13px; line-height: 1.3; }
    .friendly-now-meta {
      grid-column: 1 / -1;
      display: flex; flex-wrap: wrap; gap: 12px;
      font-size: 11px; color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 2px;
    }

    .friendly-row {
      display: grid;
      grid-template-columns: 56px 32px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: var(--surface-3);
      border-radius: 4px;
      font-size: 12px;
    }
    .friendly-row .fr-time { color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .friendly-row .fr-icon { font-size: 18px; text-align: center; }
    .friendly-row .fr-cond { color: var(--text); }
    .friendly-row .fr-temp { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
    .friendly-row.now      { background: #1e3050; border-left: 2px solid var(--blue); }
    .friendly-section {
      display: flex; flex-direction: column;
      gap: 3px;
      padding: 2px 0 6px;
    }

    /* Slide-in station panel — fills the right edge below the header. */
    .station-panel {
      position: fixed;
      top: 55px;       /* header is ~52 + 3 px stripe */
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 100vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 16px rgba(0, 0, 0, 0.7);
      overflow-y: auto;
      z-index: 999;
      padding: 14px 18px 32px;
      color: var(--text);
      transform: translateX(100%);
      transition: transform 0.22s ease-out;
      font-family: var(--font);
    }
    .station-panel.open { transform: translateX(0); }
    /* When the panel is open, push topright Leaflet controls (legend etc.)
       inward so they aren't hidden under the panel. */
    body.panel-open .leaflet-top.leaflet-right { right: 432px; transition: right 0.22s ease-out; }
    .leaflet-top.leaflet-right { transition: right 0.22s ease-out; }
    .panel-close {
      position: sticky;
      top: 0;
      float: right;
      margin: -6px -8px 0 0;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      font-size: 22px;
      line-height: 1;
      width: 32px;
      height: 32px;
      cursor: pointer;
      border-radius: 4px;
    }
    .panel-close:hover { color: var(--text); border-color: var(--border); }
    @media (max-width: 600px) {
      .station-panel { width: 100vw; top: 0; padding-top: 50px; }
      .panel-close   { position: fixed; top: 6px; right: 6px; }
    }

    /* RainViewer animation HUD */
    .rv-hud {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      color: var(--text);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      font-family: var(--font);
    }
    .rv-hud button {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .rv-hud button:hover { background: var(--surface-3); border-color: var(--blue); }
    .rv-hud #rv-time { font-variant-numeric: tabular-nums; }

    /* Legend — branded card */
    .legend {
      background: var(--surface);
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .legend-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 4px;
    }

    /* Popup styles repurposed for the slide-in side panel content. */

    .popup-station {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      border-bottom: 2px solid var(--yellow);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .popup-station .station-name {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 4px;
    }
    .popup-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--blue);
      margin: 10px 0 4px;
      font-weight: 600;
    }
    .popup-now {
      padding: 8px 10px;
      background: var(--surface-2);
      border-left: 3px solid var(--yellow);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
    }
    .popup-now.stale {
      border-left-color: var(--cat-ifr);
      background: #2a1818;
    }
    .popup-now-stale-banner {
      color: var(--cat-ifr);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .popup-now-cat {
      display: inline-block; padding: 1px 6px;
      border-radius: 3px; color: white;
      font-weight: 700; font-size: 10px;
    }

    .strip {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 2px 0 6px;
    }
    .cell {
      padding: 6px 8px;
      background: var(--surface-3);
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.4;
      border: 1px solid var(--border);
      color: var(--text);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2px 12px;
      align-items: baseline;
    }
    .cell > * { min-width: 0; }
    .cell-time { grid-column: 1 / -1; font-weight: 700; color: var(--text); }
    .cell.amend {
      background: var(--yellow-soft);
      border-color: var(--yellow);
      border-width: 1.5px;
    }
    .cell.diverged {
      border-color: var(--cat-ifr);
      border-width: 1.5px;
    }
    .cell.tempo {
      background: #0c2a32; /* deep cyan */
      border-color: #22d3ee; /* cyan-400 */
      border-style: dashed;
    }
    .cell.prob {
      background: #1f1240; /* deep violet */
      border-color: #a78bfa; /* violet-400 */
      border-style: dashed;
    }
    .cell.nws {
      background: #122636; /* slightly different navy with sky cast */
      border-color: var(--blue-bright);
    }
    .cell.nws .cell-time {
      color: var(--blue-bright);
    }
    .cell-cat {
      display: inline-block; padding: 0 5px;
      border-radius: 2px; color: white;
      font-size: 9px; font-weight: 700;
      margin-left: 3px;
    }
    .caveat {
      margin-top: 4px;
      padding: 3px 5px;
      background: rgba(0, 0, 0, 0.35);
      border-left: 2px solid var(--blue);
      border-radius: 2px;
      font-size: 10px;
      color: var(--text);
    }
    .empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
      padding: 4px 0;
    }
    .err { color: var(--cat-ifr); font-size: 12px; }
  </style>
</head>
<body>

<header>
  <img src="/static/soonstone.svg" alt="Soonstone">
  <h1>Soon<span class="accent">stone</span></h1>
  <div class="mode-toggle" id="mode-toggle" role="tablist">
    <button data-mode="friendly" role="tab">Friendly</button>
    <button data-mode="aviation" role="tab">Aviation</button>
  </div>
  <span class="tagline">forecast verification &middot; <span id="station-count">…</span> stations</span>
</header>

<div id="map"></div>

<aside id="station-panel" class="station-panel" hidden aria-label="Station details">
  <button id="station-panel-close" class="panel-close" title="Close">&times;</button>
  <div id="station-panel-body"></div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const CAT_COLOR = {
  VFR: "#3fb950", MVFR: "#58a6ff", IFR: "#ff7b7b", LIFR: "#d093ff"
};
const CAT_BG = (cat) => CAT_COLOR[cat] || "#cbd5e1"; /* slate-300 for unknown on dark */

const map = L.map("map", { zoomControl: true }).setView([39.5, -98.5], 4);

const baseLayers = {
  "Dark": L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { attribution: '&copy; OSM &copy; CARTO', subdomains: "abcd", maxZoom: 19 }
  ),
  "Streets": L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }
  ),
};
baseLayers["Dark"].addTo(map);

// FAA VFR sectional tiles only exist at zoom >= 8 (no continental composite,
// only chart-scale segments). Modeled as an overlay on top of the dark base
// so zooming out doesn't blank the map.
const vfrLayer = L.tileLayer(
  "https://tiles.arcgis.com/tiles/ssFJjBXIUyZDrSYZ/arcgis/rest/services/VFR_Sectional/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: 'VFR charts &copy; FAA',
    minZoom: 8,
    maxZoom: 18,
    maxNativeZoom: 11,
    opacity: 0.85,
  }
);

/* RainViewer animated overlays (radar + satellite). Preload last hour of
   frames and cycle.

   Default off; user toggles via the layer control. When enabled, fetches
   RainViewer's manifest, takes the last 12 past frames (~60 min @ 5-min
   spacing), preloads each as its own L.tileLayer with opacity 0, then
   cycles which one is at opacity (radar 0.6, satellite 0.5) every 700 ms.
   A small HUD at the bottom-left shows the current frame's timestamp and
   a play/pause. The manifest is re-fetched every 5 min and both frame
   stacks rebuilt. Tiles are 512 px (matches RainViewer's website quality
   on retina) with maxNativeZoom 14 -- crisp through the chart-overlap
   range. */

const RV_FRAME_COUNT      = 12;
const RV_FRAME_INTERVAL   = 700;
const RV_REFRESH_INTERVAL = 5 * 60 * 1000;
const RV_RADAR_OPACITY    = 0.6;
const RV_SATELLITE_OPACITY = 0.5;
const RV_TILE_SIZE        = 512;
/* RainViewer URL options: /{size}/{z}/{x}/{y}/{color}/{smooth}_{snow}.png
   color 2  = "Original BR" radar palette
   color 0  = satellite IR color
   1_1      = smoothing on, snow rendered distinctly                       */
const RV_RADAR_OPTS    = "2/1_1.png";
const RV_SATELLITE_OPTS = "0/0_0.png";

let rvFrames = [];
let rvSatFrames = [];
let rvCurrentIdx = 0;
let rvAnimTimer = null;
let rvRefreshTimer = null;
let rvPaused = false;
let rvHud = null;
let rvRadarOn = false;
let rvSatelliteOn = false;

async function rvRebuild() {
  let manifest;
  try {
    const r = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    manifest = await r.json();
  } catch (_) { return; }

  const past = (manifest.radar && manifest.radar.past) || [];
  const sat  = (manifest.satellite && manifest.satellite.infrared) || [];

  // Tear down both stacks.
  for (const layer of rvFrames) if (map.hasLayer(layer)) map.removeLayer(layer);
  for (const layer of rvSatFrames) if (map.hasLayer(layer)) map.removeLayer(layer);
  rvFrames = [];
  rvSatFrames = [];

  if (rvRadarOn) {
    for (const frame of past.slice(-RV_FRAME_COUNT)) {
      const url = `${manifest.host}${frame.path}/${RV_TILE_SIZE}/{z}/{x}/{y}/${RV_RADAR_OPTS}`;
      const layer = L.tileLayer(url, {
        opacity: 0,
        attribution: 'Radar &copy; <a href="https://www.rainviewer.com/">RainViewer</a>',
        maxZoom: 18,
        maxNativeZoom: 8,  /* radar's ~1km resolution bottoms out here; above z=8 the tiles are empty */
        tileSize: RV_TILE_SIZE,
        zoomOffset: -1,  /* required when tileSize=512 to keep zoom math right */
      });
      layer._rvTimestamp = frame.time;
      attachTileRetry(layer);
      layer.addTo(map);
      rvFrames.push(layer);
    }
  }

  if (rvSatelliteOn) {
    if (!sat.length) {
      showToast("Satellite imagery currently unavailable from RainViewer.", "warn");
    }
    for (const frame of sat.slice(-RV_FRAME_COUNT)) {
      const url = `${manifest.host}${frame.path}/${RV_TILE_SIZE}/{z}/{x}/{y}/${RV_SATELLITE_OPTS}`;
      const layer = L.tileLayer(url, {
        opacity: 0,
        attribution: 'Satellite &copy; <a href="https://www.rainviewer.com/">RainViewer</a>',
        maxZoom: 18,
        maxNativeZoom: 8,
        tileSize: RV_TILE_SIZE,
        zoomOffset: -1,
      });
      layer._rvTimestamp = frame.time;
      attachTileRetry(layer);
      layer.addTo(map);
      rvSatFrames.push(layer);
    }
  }

  const visibleStack = rvFrames.length ? rvFrames : rvSatFrames;
  rvCurrentIdx = Math.max(0, visibleStack.length - 1);
  rvShowFrame(rvCurrentIdx);
}

function showToast(msg, kind = "", durationMs = 4000) {
  const el = document.createElement("div");
  el.className = "toast" + (kind ? " toast-" + kind : "");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), durationMs);
}

function rvShowFrame(idx) {
  /* Radar frames have their own timeline; satellite frames have their own
     timeline (cadences differ). For the cycler we use the LONGER stack as
     the primary timeline; the other stack picks its closest-matching frame
     by timestamp. The HUD shows the primary timeline's current timestamp. */
  const primary = rvFrames.length >= rvSatFrames.length ? rvFrames : rvSatFrames;
  if (!primary.length) return;
  const primaryFrame = primary[idx];
  const primaryTs = primaryFrame._rvTimestamp;

  for (let i = 0; i < rvFrames.length; i++) {
    rvFrames[i].setOpacity(i === idx && primary === rvFrames ? RV_RADAR_OPACITY : 0);
  }
  if (primary === rvSatFrames) {
    /* Pick the radar frame whose timestamp is closest to the primary's. */
    const matchIdx = _rvClosestIdx(rvFrames, primaryTs);
    if (matchIdx !== -1) rvFrames[matchIdx].setOpacity(RV_RADAR_OPACITY);
  }

  for (let i = 0; i < rvSatFrames.length; i++) {
    rvSatFrames[i].setOpacity(i === idx && primary === rvSatFrames ? RV_SATELLITE_OPACITY : 0);
  }
  if (primary === rvFrames) {
    const matchIdx = _rvClosestIdx(rvSatFrames, primaryTs);
    if (matchIdx !== -1) rvSatFrames[matchIdx].setOpacity(RV_SATELLITE_OPACITY);
  }

  if (rvHud) rvHud._update(primaryTs);
}

function _rvClosestIdx(stack, ts) {
  if (!stack.length) return -1;
  let best = 0, bestDiff = Math.abs(stack[0]._rvTimestamp - ts);
  for (let i = 1; i < stack.length; i++) {
    const d = Math.abs(stack[i]._rvTimestamp - ts);
    if (d < bestDiff) { best = i; bestDiff = d; }
  }
  return best;
}

function rvTick() {
  if (rvPaused) return;
  const primary = rvFrames.length >= rvSatFrames.length ? rvFrames : rvSatFrames;
  if (!primary.length) return;
  rvCurrentIdx = (rvCurrentIdx + 1) % primary.length;
  rvShowFrame(rvCurrentIdx);
}

const RvHudControl = L.Control.extend({
  options: { position: "bottomleft" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "rv-hud");
    div.innerHTML = `<button id="rv-toggle" title="play/pause">&#9208;</button><span id="rv-time">…</span>`;
    L.DomEvent.disableClickPropagation(div);
    div.querySelector("#rv-toggle").addEventListener("click", () => {
      rvPaused = !rvPaused;
      div.querySelector("#rv-toggle").innerHTML = rvPaused ? "&#9654;" : "&#9208;";
    });
    return div;
  },
  _update: function (epochSec) {
    const dt = new Date(epochSec * 1000);
    const local = dt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    const utc =
      String(dt.getUTCHours()).padStart(2, "0") + ":" +
      String(dt.getUTCMinutes()).padStart(2, "0");
    const span = document.getElementById("rv-time");
    if (span) span.textContent = `${local} (${utc} UTC)`;
  },
});

const placeholderLayer = L.layerGroup();

/* Tile-error retry helper. Leaflet doesn't retry failed tiles by default,
   so any transient 5xx, network blip, or rate-limit drop just leaves a
   gap. attachTileRetry() listens for tileerror and reloads the failing
   tile up to MAX_RETRIES with exponential backoff. The cache-buster
   suffix (?_r=N or &_r=N) bypasses any HTTP caching of the failed
   response. */

const TILE_RETRY_MAX = 3;
const TILE_RETRY_DELAY_MS = 400;

function attachTileRetry(layer) {
  layer.on("tileerror", (e) => {
    const tile = e.tile;
    const tries = (tile._sxRetries || 0) + 1;
    if (tries > TILE_RETRY_MAX) return;
    tile._sxRetries = tries;
    const delay = TILE_RETRY_DELAY_MS * Math.pow(2, tries - 1);
    setTimeout(() => {
      const cleanSrc = tile.src.replace(/[?&]_r=\d+/g, "").replace(/[?&]$/, "");
      const sep = cleanSrc.includes("?") ? "&" : "?";
      tile.src = cleanSrc + sep + "_r=" + tries;
    }, delay);
  });
}

/* NOAA NEXRAD radar via IEM. Single static layer, refreshed every 5 min by
   bumping a version query string. Native cap z=9 (radar's ~1 km resolution
   bottoms out around there); above that, Leaflet upscales the z=9 tiles. */
const NEXRAD_TILE_URL = "https://mesonet.agron.iastate.edu/c/tile.py/1.0.0/ridge::USCOMP-N0Q-0/{z}/{x}/{y}.png";
const nexradLayer = L.tileLayer(NEXRAD_TILE_URL + "?v=" + Math.floor(Date.now() / 60000), {
  opacity: 0.65,
  attribution: 'Radar &copy; NOAA / IEM',
  maxZoom: 18,
  maxNativeZoom: 9,
});
setInterval(() => {
  nexradLayer.setUrl(NEXRAD_TILE_URL + "?v=" + Math.floor(Date.now() / 60000));
}, 5 * 60 * 1000);
attachTileRetry(nexradLayer);

/* NEXRAD animated overlay — preload last hour of frames at 5-min cadence
   from IEM's timestamped layer namespace, cycle visibility every 700 ms.
   Mirrors the RainViewer animation but on NOAA's NEXRAD composite. */

const NX_FRAME_COUNT      = 12;
const NX_FRAME_INTERVAL   = 700;
const NX_REFRESH_INTERVAL = 5 * 60 * 1000;
const NX_OPACITY          = 0.65;

let nxFrames = [];
let nxCurrentIdx = 0;
let nxAnimTimer = null;
let nxRefreshTimer = null;
let nxPaused = false;
let nxHud = null;

function _nxPad(n) { return n < 10 ? "0" + n : "" + n; }

function _nxFrameTimestamps() {
  /* Most recent 12 5-min boundaries, biased ~5 min back so the freshest
     frame is just-published rather than not-yet-published. */
  const out = [];
  const head = new Date();
  head.setSeconds(0, 0);
  head.setMinutes(head.getMinutes() - (head.getMinutes() % 5) - 5);
  for (let i = NX_FRAME_COUNT - 1; i >= 0; i--) {
    const t = new Date(head.getTime() - i * 5 * 60 * 1000);
    out.push({
      time: Math.floor(t.getTime() / 1000),
      stamp:
        t.getUTCFullYear() +
        _nxPad(t.getUTCMonth() + 1) +
        _nxPad(t.getUTCDate()) +
        _nxPad(t.getUTCHours()) +
        _nxPad(t.getUTCMinutes()),
    });
  }
  return out;
}

function _nxUrl(stamp) {
  return `https://mesonet.agron.iastate.edu/c/tile.py/1.0.0/ridge::USCOMP-N0Q-${stamp}/{z}/{x}/{y}.png`;
}

function nxRebuild() {
  for (const layer of nxFrames) if (map.hasLayer(layer)) map.removeLayer(layer);
  nxFrames = [];
  for (const f of _nxFrameTimestamps()) {
    const layer = L.tileLayer(_nxUrl(f.stamp), {
      opacity: 0,
      attribution: 'Radar &copy; NOAA / IEM',
      maxZoom: 18,
      maxNativeZoom: 9,
    });
    layer._nxTime = f.time;
    attachTileRetry(layer);
    layer.addTo(map);
    nxFrames.push(layer);
  }
  nxCurrentIdx = nxFrames.length - 1;
  nxShowFrame(nxCurrentIdx);
}

function nxShowFrame(idx) {
  for (let i = 0; i < nxFrames.length; i++) {
    nxFrames[i].setOpacity(i === idx ? NX_OPACITY : 0);
  }
  if (nxHud) nxHud._update(nxFrames[idx]._nxTime);
}

function nxTick() {
  if (nxPaused || !nxFrames.length) return;
  nxCurrentIdx = (nxCurrentIdx + 1) % nxFrames.length;
  nxShowFrame(nxCurrentIdx);
}

const NxHudControl = L.Control.extend({
  options: { position: "bottomleft" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "rv-hud");
    div.innerHTML =
      '<span style="color:var(--blue)">NEXRAD</span> ' +
      '<button id="nx-toggle" title="play/pause">&#9208;</button>' +
      '<span id="nx-time">…</span>';
    L.DomEvent.disableClickPropagation(div);
    div.querySelector("#nx-toggle").addEventListener("click", () => {
      nxPaused = !nxPaused;
      div.querySelector("#nx-toggle").innerHTML = nxPaused ? "&#9654;" : "&#9208;";
    });
    return div;
  },
  _update: function (epochSec) {
    const dt = new Date(epochSec * 1000);
    const local = dt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    const utc =
      String(dt.getUTCHours()).padStart(2, "0") + ":" +
      String(dt.getUTCMinutes()).padStart(2, "0");
    const span = document.getElementById("nx-time");
    if (span) span.textContent = `${local} (${utc} UTC)`;
  },
});

const nexradAnimPlaceholder = L.layerGroup();

/* NOAA GOES GeoColor via NASA GIBS. Publishing is irregular — some 10-min
   slots are missing, gaps shift over time. We HEAD-probe a chain of
   candidate offsets and use the first one that returns 200, refreshing
   every 10 min so a stale URL doesn't sit forever. */
const GIBS_OFFSET_MIN_CANDIDATES = [30, 60, 75, 90, 120, 180, 240];
const GIBS_BASE = "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GOES-East_ABI_GeoColor/default";

function _gibsStampForOffset(offsetMin) {
  const t = new Date(Date.now() - offsetMin * 60 * 1000);
  t.setSeconds(0, 0);
  t.setMinutes(t.getMinutes() - (t.getMinutes() % 10));
  return t.toISOString().replace(/\.\d+Z$/, "Z");
}

function _gibsUrlFromStamp(stamp) {
  return `${GIBS_BASE}/${stamp}/GoogleMapsCompatible_Level7/{z}/{y}/{x}.png`;
}

async function _findWorkingGibsStamp() {
  for (const offset of GIBS_OFFSET_MIN_CANDIDATES) {
    const stamp = _gibsStampForOffset(offset);
    const probeUrl = `${GIBS_BASE}/${stamp}/GoogleMapsCompatible_Level7/2/1/1.png`;
    try {
      const r = await fetch(probeUrl, { method: "HEAD" });
      if (r.ok) return stamp;
    } catch (_) { /* keep walking */ }
  }
  return null;
}

const gibsLayer = L.tileLayer(_gibsUrlFromStamp(_gibsStampForOffset(90)), {
  opacity: 0.55,
  attribution: 'GOES GeoColor &copy; NOAA / NASA GIBS',
  maxZoom: 18,
  maxNativeZoom: 7,
});

async function _refreshGibsLayerUrl() {
  const stamp = await _findWorkingGibsStamp();
  if (stamp) gibsLayer.setUrl(_gibsUrlFromStamp(stamp));
}

/* Initial probe at page load + every 10 min thereafter. */
_refreshGibsLayerUrl();
setInterval(_refreshGibsLayerUrl, 10 * 60 * 1000);
attachTileRetry(gibsLayer);

/* AIRMET/SIGMET overlay -- empty L.geoJSON, populated lazily on enable. */
const HAZARD_STYLES = {
  CONVECTIVE:  { color: "#dc2626", fillColor: "#dc2626", weight: 2,   fillOpacity: 0.22, dashArray: "6,4" },
  TURB:        { color: "#f97316", fillColor: "#f97316", weight: 2,   fillOpacity: 0.18 },
  ICE:         { color: "#a855f7", fillColor: "#a855f7", weight: 2,   fillOpacity: 0.18 },
  IFR:         { color: "#3b82f6", fillColor: "#3b82f6", weight: 1.5, fillOpacity: 0.18 },
  "MTN OBSCN": { color: "#a16207", fillColor: "#a16207", weight: 1.5, fillOpacity: 0.18, dashArray: "4,3" },
  ASH:         { color: "#525252", fillColor: "#525252", weight: 2,   fillOpacity: 0.30 },
};

/* AWC returns severity as either a numeric 0-6 (airsigmet endpoint) or as
   the string code 'NONE'/'MOD'/'SEV'. Normalize both. */
function severityBucket(s) {
  if (s == null) return null;
  if (typeof s === "string") {
    if (s === "SEV") return "SEV";
    if (s === "MOD") return "MOD";
    return null;
  }
  if (s >= 4) return "SEV";
  if (s >= 2) return "MOD";
  return null;
}

function styleForHazard(hazard, severity) {
  const base = HAZARD_STYLES[hazard] || {
    color: "#94a3b8", fillColor: "#94a3b8", weight: 1.5, fillOpacity: 0.15,
  };
  const bucket = severityBucket(severity);
  if (bucket === "SEV") return { ...base, weight: base.weight + 1 };
  if (bucket === "MOD" && !base.dashArray) return { ...base, dashArray: "3,3" };
  return base;
}

function escapeHtml(s) {
  return (s || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function isoFromAwcTimestring(s) {
  // AWC's airsigmet validTimeFrom is like '2026-05-03T13:00:00Z' or
  // '2026-05-03 13:00:00' depending on endpoint. Normalize.
  if (!s) return null;
  let t = s;
  if (t.includes(" ") && !t.includes("T")) t = t.replace(" ", "T");
  if (!t.endsWith("Z") && !t.match(/[+-]\d\d:?\d\d$/)) t += "Z";
  return t;
}

function airsigmetPopup(feature) {
  const p = feature.properties || {};
  const head = `${p.airSigmetType || "BULLETIN"}: ${p.hazard || ""}`;
  const bucket = severityBucket(p.severity);
  const sev = bucket ? ` &middot; ${bucket}` : "";
  const fromIso = isoFromAwcTimestring(p.validTimeFrom);
  const toIso = isoFromAwcTimestring(p.validTimeTo);
  const valid = (fromIso && toIso) ? fmtTimeRange(fromIso, toIso) : "—";
  const raw = escapeHtml(p.rawAirSigmet || "").replace(/\n/g, "<br>");
  return `
    <div class="popup-station">${head}${sev}</div>
    <div class="popup-section-label">Valid</div>
    <div>${valid}</div>
    ${raw ? `<div class="popup-section-label">Bulletin</div><pre style="font-size:10px;white-space:pre-wrap;line-height:1.3;color:var(--text-muted)">${raw}</pre>` : ""}
  `;
}

const airsigmetsLayer = L.geoJSON(null, {
  style: (f) => styleForHazard(f.properties.hazard, f.properties.severity),
  onEachFeature: (feature, layer) => {
    layer.bindPopup(airsigmetPopup(feature));
  },
});

let airsigmetsRefreshTimer = null;
const AIRSIG_REFRESH_MS = 5 * 60 * 1000;

async function refreshAirsigmets() {
  try {
    const r = await fetch("/api/airsigmets");
    const fc = await r.json();
    airsigmetsLayer.clearLayers();
    airsigmetsLayer.addData(fc);
  } catch (_) { /* ignore; current overlay stays */ }
}

const radarPlaceholder = L.layerGroup();
const satellitePlaceholder = L.layerGroup();
const overlays = {
  "VFR Sectional (zoom in past 8)": vfrLayer,
  "Hazards (AIRMET/SIGMET)": airsigmetsLayer,
  "NEXRAD radar (NOAA, current)": nexradLayer,
  "NEXRAD radar (NOAA, animated)": nexradAnimPlaceholder,
  "GOES GeoColor clouds (NOAA, day)": gibsLayer,
  "Live radar (RainViewer, animated)": radarPlaceholder,
};

async function rvEnsureStarted() {
  if (!rvHud) {
    rvHud = new RvHudControl();
    rvHud.addTo(map);
    rvPaused = false;
  }
  await rvRebuild();
  if (!rvAnimTimer) rvAnimTimer = setInterval(rvTick, RV_FRAME_INTERVAL);
  if (!rvRefreshTimer) rvRefreshTimer = setInterval(rvRebuild, RV_REFRESH_INTERVAL);
}

function rvMaybeStop() {
  if (rvRadarOn || rvSatelliteOn) return;
  if (rvHud) { map.removeControl(rvHud); rvHud = null; }
  if (rvAnimTimer) { clearInterval(rvAnimTimer); rvAnimTimer = null; }
  if (rvRefreshTimer) { clearInterval(rvRefreshTimer); rvRefreshTimer = null; }
  for (const l of rvFrames) if (map.hasLayer(l)) map.removeLayer(l);
  for (const l of rvSatFrames) if (map.hasLayer(l)) map.removeLayer(l);
  rvFrames = [];
  rvSatFrames = [];
}

map.on("overlayadd", async (e) => {
  if (e.name === "Hazards (AIRMET/SIGMET)") {
    await refreshAirsigmets();
    if (!airsigmetsRefreshTimer) {
      airsigmetsRefreshTimer = setInterval(refreshAirsigmets, AIRSIG_REFRESH_MS);
    }
    return;
  }
  if (e.name === "Live radar (RainViewer, animated)") {
    rvRadarOn = true;
    await rvEnsureStarted();
    return;
  }
  if (e.name === "NEXRAD radar (NOAA, animated)") {
    if (!nxHud) {
      nxHud = new NxHudControl();
      nxHud.addTo(map);
      nxPaused = false;
    }
    nxRebuild();
    if (!nxAnimTimer) nxAnimTimer = setInterval(nxTick, NX_FRAME_INTERVAL);
    if (!nxRefreshTimer) nxRefreshTimer = setInterval(nxRebuild, NX_REFRESH_INTERVAL);
    return;
  }
});

map.on("overlayremove", async (e) => {
  if (e.name === "Hazards (AIRMET/SIGMET)") {
    if (airsigmetsRefreshTimer) {
      clearInterval(airsigmetsRefreshTimer);
      airsigmetsRefreshTimer = null;
    }
    return;
  }
  if (e.name === "Live radar (RainViewer, animated)") {
    rvRadarOn = false;
    rvMaybeStop();
    return;
  }
  if (e.name === "NEXRAD radar (NOAA, animated)") {
    for (const layer of nxFrames) if (map.hasLayer(layer)) map.removeLayer(layer);
    nxFrames = [];
    if (nxHud)        { map.removeControl(nxHud); nxHud = null; }
    if (nxAnimTimer)  { clearInterval(nxAnimTimer); nxAnimTimer = null; }
    if (nxRefreshTimer) { clearInterval(nxRefreshTimer); nxRefreshTimer = null; }
    return;
  }
});

L.control.layers(baseLayers, overlays, { position: "bottomleft", collapsed: false }).addTo(map);

/* ─── Locate-me ──────────────────────────────────────────────────
   On first load, request the browser's geolocation and zoom to the
   user's area at state-level zoom (z=6). Honor user interactions —
   if they pan/zoom before location resolves, don't yank the view.
   A persistent topleft button re-triggers location on demand. */

const LOCATE_ZOOM = 6;
let userMovedMap = false;
let userLocationMarker = null;

map.on("dragstart zoomstart", () => { userMovedMap = true; });

function showUserLocation(latlng, recenter) {
  if (userLocationMarker) map.removeLayer(userLocationMarker);
  userLocationMarker = L.marker(latlng, {
    icon: L.divIcon({
      className: "user-location-marker",
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    }),
    interactive: false,
    keyboard: false,
  }).addTo(map);
  if (recenter) map.setView(latlng, LOCATE_ZOOM);
}

map.on("locationfound", (e) => {
  showUserLocation(e.latlng, !userMovedMap);
});
async function handleLocationError(e) {
  /* code 1 = PERMISSION_DENIED, 2 = POSITION_UNAVAILABLE, 3 = TIMEOUT */
  if (e.code === 2) return showToast("Your location is unavailable right now.", "warn", 6000);
  if (e.code === 3) return showToast("Locating timed out. Click ◎ to try again.", "warn", 6000);

  /* Permission denied. Disambiguate transient vs persistent. The
     Permissions API tells us whether the browser will silently deny
     forever (state==='denied') or still ask on next attempt ('prompt'). */
  let persistent = false;
  if (navigator.permissions && navigator.permissions.query) {
    try {
      const r = await navigator.permissions.query({ name: "geolocation" });
      persistent = r.state === "denied";
    } catch (_) { /* old browsers; fall back to short message */ }
  }
  if (persistent) {
    showToast(
      "Location is blocked for this site. Click the lock icon in the address bar → Location → Allow, then reload.",
      "warn", 12000,
    );
  } else {
    showToast("Location permission denied. Click ◎ in the topleft to retry.", "warn", 6000);
  }
}

map.on("locationerror", handleLocationError);

if (!navigator.geolocation) {
  showToast("Geolocation isn't supported by this browser.", "warn", 6000);
} else if (!window.isSecureContext) {
  /* Browsers restrict the geolocation API to secure contexts (HTTPS or
     localhost). Reaching the site over plain HTTP on a LAN address
     silently fails the same as 'denied'. */
  showToast(
    "Location requires HTTPS. Reach the site via soonstone.hexcaliper.com instead of the LAN address.",
    "warn", 9000,
  );
} else {
  map.locate({ setView: false, maxZoom: LOCATE_ZOOM, enableHighAccuracy: false, timeout: 10000 });
}

const LocateControl = L.Control.extend({
  options: { position: "topleft" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "leaflet-bar locate-control");
    div.innerHTML = '<a href="#" title="Find me">&#x25CE;</a>';
    L.DomEvent.disableClickPropagation(div);
    div.querySelector("a").addEventListener("click", (e) => {
      e.preventDefault();
      userMovedMap = false;  /* explicit click = consent to recenter */
      map.locate({ setView: false, maxZoom: LOCATE_ZOOM, enableHighAccuracy: false });
    });
    return div;
  },
});
new LocateControl().addTo(map);

const legend = L.control({ position: "topright" });
legend.onAdd = function() {
  const div = L.DomUtil.create("div", "legend");
  div.innerHTML = `

    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.MVFR}"></span>MVFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.IFR}"></span>IFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.LIFR}"></span>LIFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:#cbd5e1"></span>no data</div>
  `;
  return div;
};
legend.addTo(map);

/* ─── Decoders: aviation jargon → plain English ─────────────────── */

const COMPASS = ["N","NNE","NE","ENE","E","ESE","SE","SSE",
                 "S","SSW","SW","WSW","W","WNW","NW","NNW"];

function compass(deg) {
  if (deg == null) return null;
  return COMPASS[Math.round(((deg % 360) / 22.5)) % 16];
}

const FLIGHT_CAT_LABEL = {
  VFR:  { name: "VFR",  desc: "Clear, good for flight" },
  MVFR: { name: "MVFR", desc: "Marginal — reduced visibility or low clouds" },
  IFR:  { name: "IFR",  desc: "Instrument conditions — poor visibility or low ceiling" },
  LIFR: { name: "LIFR", desc: "Low instrument — very poor conditions" },
};

const CLOUD_COVER = {
  SKC: "sky clear", CLR: "clear",
  FEW: "few clouds", SCT: "scattered clouds",
  BKN: "broken clouds", OVC: "overcast",
  VV: "vertical visibility limited to",
};

const CLOUD_TYPE = { CB: "cumulonimbus (thunderstorm)", TCU: "towering cumulus" };

const WX_INTENSITY  = { "+": "heavy ", "-": "light ", "VC": "nearby " };
const WX_DESCRIPTOR = {
  MI: "shallow ", PR: "partial ", BC: "patchy ", DR: "drifting ",
  BL: "blowing ", SH: "showers of ", TS: "thunderstorm with ", FZ: "freezing ",
};
const WX_PRECIP = {
  DZ: "drizzle", RA: "rain", SN: "snow", SG: "snow grains",
  IC: "ice crystals", PL: "ice pellets", GR: "hail",
  GS: "small hail", UP: "unknown precipitation",
};
const WX_OBSCURE = {
  BR: "mist", FG: "fog", FU: "smoke", VA: "volcanic ash",
  DU: "dust", SA: "sand", HZ: "haze",
};
const WX_OTHER = {
  PO: "dust whirls", SQ: "squall", FC: "funnel cloud",
  SS: "sandstorm", DS: "duststorm",
};
function decodeWeatherToken(tok) {
  let i = 0, out = "";
  if (tok[0] === "+" || tok[0] === "-") { out += WX_INTENSITY[tok[0]]; i++; }
  else if (tok.startsWith("VC")) { out += WX_INTENSITY["VC"]; i += 2; }
  while (i < tok.length) {
    const two = tok.substring(i, i + 2);
    const map = WX_DESCRIPTOR[two] || WX_PRECIP[two] || WX_OBSCURE[two] || WX_OTHER[two];
    if (map) { out += map; i += 2; }
    else { out += tok[i]; i++; }
  }
  return out.trim();
}

const GROUP_LABEL = {
  BASE:   "Base forecast",
  FM:     "From",
  BECMG:  "Becoming",
  TEMPO:  "Temporarily",
  PROB30: "30% chance",
  PROB40: "40% chance",
};

const AMEND_LABEL = { AMD: "Amended", COR: "Corrected", RTD: "Routine delayed" };

/* ─── Formatters: render decoded values for display ─────────────── */

function fmtWind(d) {
  if (d.wind_speed_kt == null || d.wind_speed_kt === 0) return "Calm";
  const dir = d.wind_dir_deg == null ? "Variable" : compass(d.wind_dir_deg);
  const spd = Math.round(d.wind_speed_kt);
  let s = `${dir} ${spd} kt`;
  if (d.wind_gust_kt) s += ` gust ${Math.round(d.wind_gust_kt)}`;
  return s;
}

function fmtVis(v) {
  if (v == null) return "—";
  if (v >= 10) return "10+ mi";
  if (v >= 6) return "6+ mi";
  if (v >= 3) return `${v} mi`;
  if (v >= 1) return `${v} mi (low)`;
  return `${v} mi (very low)`;
}

function fmtCeiling(c) {
  return c == null ? "no ceiling reported" : `cloud base ${c.toLocaleString()} ft`;
}

function fmtClouds(layersJson) {
  if (!layersJson) return null;
  let layers;
  try { layers = JSON.parse(layersJson); } catch { return null; }
  if (!layers || !layers.length) return null;
  return layers.map(l => {
    const cover = CLOUD_COVER[l.cover] || l.cover;
    if (l.base_ft == null) return cover;
    const ct = CLOUD_TYPE[l.type] ? ` ${CLOUD_TYPE[l.type]}` : "";
    return `${cover} at ${l.base_ft.toLocaleString()} ft${ct}`;
  }).join(", ");
}

function fmtWeather(weatherJson) {
  if (!weatherJson) return null;
  let arr;
  try { arr = JSON.parse(weatherJson); } catch { return null; }
  if (!arr || !arr.length) return null;
  return arr.map(decodeWeatherToken).join(", ");
}

function fmtLeadAgo(h) {
  if (h == null) return "";
  if (h < 1) return `${Math.round(h * 60)} min ago`;
  if (h < 2) return `${h.toFixed(1)} h ago`;
  return `${Math.round(h)} h ago`;
}

function fmtLeadFwd(h) {
  if (h == null) return "";
  if (h < 0) {
    const a = Math.abs(h);
    if (a < 1) return `${Math.round(a * 60)} min ago`;
    return `${a.toFixed(1)} h ago`;
  }
  if (h < 1) return `in ${Math.round(h * 60)} min`;
  if (h < 24) return `in ${h.toFixed(1)} h`;
  return `in ${Math.round(h)} h`;
}

function fmtTime(iso) {
  // Local time first, UTC in parens. Local = browser timezone.
  const d = new Date(iso);
  const local = d.toLocaleTimeString([], {
    hour: "numeric", minute: "2-digit", timeZoneName: "short"
  });
  const utc = iso.slice(11, 16) + " UTC";
  return `${local} (${utc})`;
}

function fmtTimeRange(fromIso, toIso) {
  // Local-local with one timezone label, then UTC range in parens.
  const f = new Date(fromIso);
  const t = new Date(toIso);
  const opts = { hour: "numeric", minute: "2-digit" };
  const fLocal = f.toLocaleTimeString([], opts);
  const tLocal = t.toLocaleTimeString([], { ...opts, timeZoneName: "short" });
  const fUtc = fromIso.slice(11, 16);
  const tUtc = toIso.slice(11, 16);
  return `${fLocal}–${tLocal} (${fUtc}–${tUtc} UTC)`;
}

function fmtCatBadge(cat) {
  if (!cat) return "";
  return `<span class="cell-cat" style="background:${CAT_BG(cat)}" title="${(FLIGHT_CAT_LABEL[cat] || {}).desc || ""}">${cat}</span>`;
}

/* ─── Render functions ──────────────────────────────────────────── */

function nowBlock(now) {
  if (!now) return `<div class="empty">no recent observation</div>`;
  const cat = FLIGHT_CAT_LABEL[now.flight_category];
  const wx = fmtWeather(now.weather);
  const clouds = fmtClouds(now.cloud_layers);
  const wxLine = wx ? `<div>Weather: ${wx}</div>` : "";
  const cloudLine = clouds ? `<div>${clouds}</div>` : "";

  /* Staleness check: if observed_at is more than 90 min in the past, this
     station may not be reporting right now. Flag it loudly so the popup
     doesn't read as 'live conditions' when it isn't. */
  const obsTime = new Date(now.observed_at).getTime();
  const ageMin = (Date.now() - obsTime) / 60000;
  const isStale = ageMin > 90;
  const ageLabel = ageMin < 60
    ? `${Math.round(ageMin)} min ago`
    : ageMin < 1440
      ? `${(ageMin / 60).toFixed(1)} h ago`
      : `${Math.round(ageMin / 1440)} days ago`;
  const headLabel = isStale
    ? `Last observation ${ageLabel}`
    : `At ${fmtTime(now.observed_at)}`;
  const staleBanner = isStale
    ? `<div class="popup-now-stale-banner">Stale &middot; station may not be reporting</div>`
    : "";

  return `
    <div class="popup-now${isStale ? " stale" : ""}">
      ${staleBanner}
      <div><strong>${headLabel}</strong> &middot; ${now.metar_type === "SPECI" ? "Special observation" : "Observation"}${isStale ? ` &middot; <span style="color:var(--text-muted)">${fmtTime(now.observed_at)}</span>` : ""}</div>
      <div>${fmtWind(now)}</div>
      <div>Visibility ${fmtVis(now.visibility_sm)} &middot; ${fmtCeiling(now.ceiling_ft)}</div>
      ${cloudLine}
      ${wxLine}
      <div style="margin-top:4px">
        <span class="popup-now-cat" style="background:${CAT_BG(now.flight_category)}">${now.flight_category || "—"}</span>
        ${cat ? `<span style="margin-left:6px;color:var(--text-muted)">${cat.desc}</span>` : ""}
      </div>
    </div>`;
}

function caveatBlock(cav) {
  const head = cav.probability_pct ? `${cav.probability_pct}% chance` : "Temporarily";
  const wx = fmtWeather(cav.weather);
  const clouds = fmtClouds(cav.cloud_layers);
  const parts = [`<strong>${head}</strong> ${fmtTimeRange(cav.group_from, cav.group_to)}`];
  parts.push(`${fmtWind(cav)} &middot; visibility ${fmtVis(cav.visibility_sm)}`);
  if (clouds) parts.push(clouds);
  if (wx) parts.push(`Weather: ${wx}`);
  if (cav.flight_category) parts.push(fmtCatBadge(cav.flight_category));
  return `<div class="caveat">${parts.map(p => `<div>${p}</div>`).join("")}</div>`;
}

function convergenceCell(c, observedCat) {
  const diverged = observedCat && c.flight_category && c.flight_category !== observedCat;
  const cls = `cell ${c.amendment_type ? "amend" : ""} ${diverged ? "diverged" : ""}`.trim();
  const amendLabel = c.amendment_type
    ? `<div style="font-weight:700;color:#fbbf24" title="${AMEND_LABEL[c.amendment_type] || ""}">${c.amendment_type}</div>`
    : "";
  return `
    <div class="${cls}">
      ${amendLabel}
      <div class="cell-time">${fmtTime(c.issued_at)}</div>
      <div>${fmtLeadAgo(c.lead_hours)}</div>
      <div>${fmtWind(c)}</div>
      <div>vis ${fmtVis(c.visibility_sm)}</div>
      <div>${fmtCatBadge(c.flight_category)}</div>
    </div>`;
}

function forwardCellNws(f) {
  const lead = fmtLeadFwd(f.lead_hours);
  const popLine = f.pop_pct != null
    ? `<div>${f.pop_pct}% chance of precip</div>`
    : "";
  const tempLine = f.temperature_f != null
    ? `<div>${f.temperature_f}&deg;F</div>`
    : "";
  const windLine = (f.wind_dir || f.wind_speed)
    ? `<div>${f.wind_dir || ""} ${f.wind_speed || ""}</div>`
    : "";
  return `
    <div class="cell nws" title="NWS public 12h forecast">
      <div class="cell-time">NWS &middot; ${f.period_name || ""}</div>
      <div>${fmtTime(f.valid_at)} &middot; ${lead}</div>
      ${windLine}
      ${tempLine}
      ${popLine}
      <div style="font-style:italic">${f.short_forecast || ""}</div>
    </div>`;
}

function forwardCell(f) {
  if (f.forecast_source === "NWS") return forwardCellNws(f);
  const cls = `cell ${f.group_type === "TEMPO" ? "tempo" : ""} ${(f.group_type || "").startsWith("PROB") ? "prob" : ""}`.trim();
  const label = GROUP_LABEL[f.group_type] || f.group_type;
  const lead = fmtLeadFwd(f.lead_hours);
  const clouds = fmtClouds(f.cloud_layers);
  const wx = fmtWeather(f.weather);
  const wxLine = wx ? `<div style="font-style:italic">${wx}</div>` : "";
  const caveats = (f.caveats || []).map(caveatBlock).join("");
  return `
    <div class="${cls}">
      <div class="cell-time">${label}</div>
      <div>${fmtTime(f.valid_at)} &middot; ${lead}</div>
      <div>${fmtWind(f)}</div>
      <div>vis ${fmtVis(f.visibility_sm)}</div>
      <div>${fmtCeiling(f.ceiling_ft)}</div>
      ${wxLine}
      <div>${fmtCatBadge(f.flight_category)}</div>
      ${caveats}
    </div>`;
}

/* ─── Consumer / "Friendly" mode rendering ──────────────────────────── */

/* Pick an emoji icon from a slice's weather + cloud_layers + sky-time. */
function consumerIcon(slice, anchorIso) {
  const wxArr = (() => { try { return JSON.parse(slice.weather || "[]"); } catch { return []; } })();
  const cloudArr = (() => { try { return JSON.parse(slice.cloud_layers || "[]"); } catch { return []; } })();
  const wxStr = wxArr.join(" ");
  if (/TS/i.test(wxStr)) return "⛈️";
  if (/SN|SG|IC/.test(wxStr)) return "🌨️";
  if (/RA|DZ/.test(wxStr)) return "🌧️";
  if (/FG|BR|HZ|FU/.test(wxStr)) return "🌫️";

  const covers = cloudArr.map((l) => l.cover);
  const night = isLocalNight(anchorIso);
  if (covers.includes("OVC")) return "☁️";
  if (covers.includes("BKN")) return night ? "☁️" : "⛅";
  if (covers.includes("SCT")) return night ? "🌙" : "🌤️";
  return night ? "🌙" : "☀️";
}

function isLocalNight(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  const h = d.getHours();
  return h < 6 || h >= 20;
}

function celsiusToF(c) {
  if (c == null) return null;
  return Math.round(c * 9 / 5 + 32);
}

function consumerCondition(slice) {
  /* Translate the slice's weather/cloud info into one short phrase. */
  const wxArr = (() => { try { return JSON.parse(slice.weather || "[]"); } catch { return []; } })();
  const cloudArr = (() => { try { return JSON.parse(slice.cloud_layers || "[]"); } catch { return []; } })();
  if (wxArr.length) return wxArr.map(decodeWeatherToken).join(", ");
  const covers = cloudArr.map((l) => l.cover);
  if (covers.includes("OVC")) return "Overcast";
  if (covers.includes("BKN")) return "Mostly cloudy";
  if (covers.includes("SCT")) return "Partly cloudy";
  if (covers.includes("FEW")) return "Mostly clear";
  return "Clear";
}

function fmtHourLabel(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "numeric" });
}

function friendlyHourRow(slice, isNow = false) {
  const tempF = celsiusToF(slice.temp_c);
  const tempLabel = tempF != null ? `${tempF}°F` : "—";
  return `
    <div class="friendly-row${isNow ? " now" : ""}">
      <span class="fr-time">${isNow ? "Now" : fmtHourLabel(slice.anchor_hour || slice.observed_at)}</span>
      <span class="fr-icon">${consumerIcon(slice, slice.anchor_hour || slice.observed_at)}</span>
      <span class="fr-cond">${consumerCondition(slice)}</span>
      <span class="fr-temp">${tempLabel}</span>
    </div>`;
}

function friendlyHourRowNoTemp(slice) {
  /* Forecast rows from TAF have no temperature. Same shape but blank temp slot. */
  return `
    <div class="friendly-row">
      <span class="fr-time">${fmtHourLabel(slice.anchor_hour)}</span>
      <span class="fr-icon">${consumerIcon(slice, slice.anchor_hour)}</span>
      <span class="fr-cond">${consumerCondition(slice)}</span>
      <span class="fr-temp" style="color:var(--text-muted)">${slice.wind_speed_kt != null ? Math.round(slice.wind_speed_kt) + " kt" : "—"}</span>
    </div>`;
}

function consumerNowBlock(now, station) {
  if (!now) return `<div class="empty">no recent observation</div>`;
  const tempF = celsiusToF(now.temp_c);
  const tempLabel = tempF != null ? `${tempF}°F` : "—";
  const cond = consumerCondition(now);
  const icon = consumerIcon(now, now.observed_at);
  const wind = fmtWind(now);
  const obsTime = new Date(now.observed_at).getTime();
  const ageMin = (Date.now() - obsTime) / 60000;
  const stale = ageMin > 90;
  const meta = [
    `${wind}`,
    `Visibility ${fmtVis(now.visibility_sm)}`,
    `${fmtCeiling(now.ceiling_ft)}`,
    stale ? `<span style="color:var(--cat-ifr)">stale (${Math.round(ageMin)} min ago)</span>` : `As of ${fmtTime(now.observed_at)}`,
  ];
  return `
    <div class="friendly-now${stale ? " stale" : ""}">
      <div class="friendly-now-icon">${icon}</div>
      <div>
        <div class="friendly-now-temp">${tempLabel}</div>
        <div class="friendly-now-cond">${cond}</div>
      </div>
      <div class="friendly-now-meta">${meta.join(" &middot; ")}</div>
    </div>`;
}

function consumerPanelHtml(snap) {
  const name = snap.station.name ? `<span class="station-name">${snap.station.name}</span>` : "";
  const recent = (snap.recent || []).slice().reverse(); /* most-recent first */
  const hourly = snap.hourly || [];
  const nws = (snap.forward || []).filter((f) => f.forecast_source === "NWS");

  const recentBlock = recent.length
    ? `<div class="friendly-section">${recent.map((r) => friendlyHourRow(r)).join("")}</div>`
    : `<div class="empty">no observations in the last 24 h</div>`;

  const hourlyBlock = hourly.length
    ? `<div class="friendly-section">${hourly.map((h) => friendlyHourRowNoTemp(h)).join("")}</div>`
    : `<div class="empty">no active TAF for hourly forecast</div>`;

  const nwsBlock = nws.length
    ? `<div class="friendly-section">${nws.map((p) => `
        <div class="friendly-row">
          <span class="fr-time" style="grid-column:span 2">${p.period_name || ""}</span>
          <span class="fr-cond">${p.short_forecast || ""}</span>
          <span class="fr-temp">${p.temperature_f != null ? p.temperature_f + "°F" : ""}</span>
        </div>
      `).join("")}</div>`
    : "";

  return `
    <div class="popup-station">${snap.station.id}${name}</div>
    ${consumerNowBlock(snap.now, snap.station)}
    <div class="popup-section-label">Past 24 hours</div>
    ${recentBlock}
    <div class="popup-section-label">Next 24 hours (from TAF)</div>
    ${hourlyBlock}
    ${nwsBlock ? `<div class="popup-section-label">Multi-day outlook (NWS)</div>${nwsBlock}` : ""}
  `;
}

function popupHtml(snap) {
  const observedCat = snap.now ? snap.now.flight_category : null;
  const convStrip = snap.convergence.length
    ? `<div class="strip">${snap.convergence.map(c => convergenceCell(c, observedCat)).join("")}</div>`
    : `<div class="empty">no TAF in last 24h</div>`;
  const fwdStrip = snap.forward.length
    ? `<div class="strip">${snap.forward.map(forwardCell).join("")}</div>`
    : `<div class="empty">no active TAF</div>`;
  const name = snap.station.name ? `<span class="station-name">${snap.station.name}</span>` : "";
  return `
    <div class="popup-station">${snap.station.id}${name}</div>
    <div class="popup-section-label">Now</div>
    ${nowBlock(snap.now)}
    <div class="popup-section-label">Convergence (last 24h)</div>
    ${convStrip}
    <div class="popup-section-label">Forward forecast</div>
    ${fwdStrip}
  `;
}

const stationPanel     = document.getElementById("station-panel");
const stationPanelBody = document.getElementById("station-panel-body");

/* Display mode — 'friendly' (consumer / weather-channel style) or
   'aviation' (METAR/TAF semantics). Persisted in localStorage. */
let displayMode = localStorage.getItem("soonstone.mode") || "friendly";
let lastSnap = null;  /* re-render on mode flip without re-fetching */

function setDisplayMode(mode) {
  if (mode !== "friendly" && mode !== "aviation") return;
  displayMode = mode;
  localStorage.setItem("soonstone.mode", mode);
  document.querySelectorAll("#mode-toggle button").forEach((b) => {
    b.classList.toggle("active", b.dataset.mode === mode);
  });
  if (lastSnap && !stationPanel.hidden) {
    stationPanelBody.innerHTML = renderPanel(lastSnap);
  }
}

function renderPanel(snap) {
  return displayMode === "aviation" ? popupHtml(snap) : consumerPanelHtml(snap);
}

document.querySelectorAll("#mode-toggle button").forEach((b) => {
  b.addEventListener("click", () => setDisplayMode(b.dataset.mode));
});
setDisplayMode(displayMode);  /* initial highlight */

function openStationPanel() {
  stationPanel.hidden = false;
  /* Force reflow so the transform transition fires from translateX(100%) */
  stationPanel.getBoundingClientRect();
  stationPanel.classList.add("open");
  document.body.classList.add("panel-open");
}

function closeStationPanel() {
  stationPanel.classList.remove("open");
  document.body.classList.remove("panel-open");
  setTimeout(() => { stationPanel.hidden = true; }, 240);
}

document.getElementById("station-panel-close").addEventListener("click", closeStationPanel);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && stationPanel.classList.contains("open")) closeStationPanel();
});
/* Click on empty map (not a marker) also closes the panel. */
map.on("click", (e) => {
  if (stationPanel.classList.contains("open")) closeStationPanel();
});

async function loadSnapshot(stationId) {
  stationPanelBody.innerHTML = `<div class="empty">loading ${stationId}…</div>`;
  openStationPanel();
  try {
    const resp = await fetch(`/api/stations/${stationId}/snapshot`);
    if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
    const snap = await resp.json();
    lastSnap = snap;
    stationPanelBody.innerHTML = renderPanel(snap);
  } catch (err) {
    stationPanelBody.innerHTML = `<div class="err">error: ${err.message}</div>`;
  }
}

async function init() {
  const resp = await fetch("/api/stations");
  const fc = await resp.json();
  document.getElementById("station-count").textContent = fc.features.length;
  for (const feat of fc.features) {
    const [lon, lat] = feat.geometry.coordinates;
    const cat = feat.properties.flight_category;
    const marker = L.circleMarker([lat, lon], {
      radius: 6,
      fillColor: CAT_BG(cat),
      color: "#0f172a",     /* slate-900 hairline ring for definition */
      weight: 0.8,
      fillOpacity: 0.95,
    }).addTo(map);
    marker.on("click", (e) => {
      L.DomEvent.stopPropagation(e);  /* don't trigger the map-click close */
      loadSnapshot(feat.properties.id);
    });
    marker.bindTooltip(`${feat.properties.id}${cat ? " (" + cat + ")" : ""}`);
  }
}

init();
</script>
