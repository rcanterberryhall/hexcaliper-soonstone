<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soonstone — Forecast Verification</title>
  <link rel="icon" type="image/svg+xml" href="/static/soonstone.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    :root {
      /* Dark theme — sunstone-after-dusk palette */
      --bg:            #0d1421;  /* deep navy, sits near CartoDB Dark Matter */
      --surface:       #142235;  /* header, cards */
      --surface-2:     #1a2b42;  /* popup-now bg */
      --surface-3:     #1f2f47;  /* neutral cell */
      --border:        #1e3a5f;  /* sky-tinted subtle border */
      --border-strong: #0ea5e9;  /* sky-500 emphasis */

      /* Brand (brighter on dark for parity with merLLM / lancellmot) */
      --blue:          #38bdf8;  /* sky-400 */
      --blue-bright:   #7dd3fc;  /* sky-300 */
      --yellow:        #fbbf24;  /* amber-400 — header stripe, AMD highlight */
      --yellow-soft:   #3a2806;  /* amber-950ish — AMD cell tint on dark */

      /* Text */
      --text:          #e0f2fe;  /* sky-100 */
      --text-muted:    #94a3b8;  /* slate-400 */

      /* Aviation flight categories (brightened-for-dark; matches map markers) */
      --cat-vfr:  #3fb950;
      --cat-mvfr: #58a6ff;
      --cat-ifr:  #ff7b7b;
      --cat-lifr: #d093ff;

      --radius:        8px;
      --font:          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    /* Header bar — fixed at top, overlays the map. Yellow top stripe is the
       brand thread (matches lancellmot's gold top-border convention). */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--yellow);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }
    header img {
      width: 36px; height: 36px;
      filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.55));
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    header h1 .accent { color: var(--blue); }
    header .tagline {
      margin-left: 4px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    #map {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
    }

    /* Push Leaflet's top-left zoom control below the fixed header so it
       doesn't get hidden under the title bar. Header is ~52px tall plus
       the 3px amber stripe = ~55px; round up. */
    .leaflet-top.leaflet-left { top: 64px; }

    /* Match the Leaflet zoom control to the dark theme. */
    .leaflet-bar {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5) !important;
      border: 1px solid var(--border) !important;
    }
    .leaflet-bar a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .leaflet-bar a:hover {
      background: var(--surface-2) !important;
    }
    .leaflet-control-attribution {
      background: rgba(20, 34, 53, 0.85) !important;
      color: var(--text-muted) !important;
    }
    .leaflet-control-attribution a {
      color: var(--blue) !important;
    }
    .leaflet-control-layers {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5) !important;
    }
    .leaflet-control-layers-base label { color: var(--text); }
    .leaflet-control-layers-separator { border-top-color: var(--border) !important; }

    /* RainViewer animation HUD */
    .rv-hud {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      color: var(--text);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      font-family: var(--font);
    }
    .rv-hud button {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .rv-hud button:hover { background: var(--surface-3); border-color: var(--blue); }
    .rv-hud #rv-time { font-variant-numeric: tabular-nums; }

    /* Legend — branded card */
    .legend {
      background: var(--surface);
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .legend-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 4px;
    }

    /* Popup — dark surface with sky-tinted borders and amber AMD accent */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.7);
      border: 1px solid var(--border);
    }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 10px 12px; min-width: 340px; max-width: 560px; }
    .leaflet-popup-close-button { color: var(--text-muted) !important; }
    .leaflet-popup-close-button:hover { color: var(--text) !important; }

    .popup-station {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      border-bottom: 2px solid var(--yellow);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .popup-station .station-name {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 4px;
    }
    .popup-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--blue);
      margin: 10px 0 4px;
      font-weight: 600;
    }
    .popup-now {
      padding: 8px 10px;
      background: var(--surface-2);
      border-left: 3px solid var(--yellow);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
    }
    .popup-now-cat {
      display: inline-block; padding: 1px 6px;
      border-radius: 3px; color: white;
      font-weight: 700; font-size: 10px;
    }

    .strip {
      display: flex; gap: 4px;
      overflow-x: auto;
      padding: 2px 0 6px;
    }
    .cell {
      flex: 0 0 auto;
      min-width: 130px;
      max-width: 180px;
      padding: 6px 8px;
      background: var(--surface-3);
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.4;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .cell.amend {
      background: var(--yellow-soft);
      border-color: var(--yellow);
      border-width: 1.5px;
    }
    .cell.diverged {
      border-color: var(--cat-ifr);
      border-width: 1.5px;
    }
    .cell.tempo {
      background: #0c2a32; /* deep cyan */
      border-color: #22d3ee; /* cyan-400 */
      border-style: dashed;
    }
    .cell.prob {
      background: #1f1240; /* deep violet */
      border-color: #a78bfa; /* violet-400 */
      border-style: dashed;
    }
    .cell.nws {
      background: #122636; /* slightly different navy with sky cast */
      border-color: var(--blue-bright);
    }
    .cell.nws .cell-time {
      color: var(--blue-bright);
    }
    .cell-time { font-weight: 700; color: var(--text); }
    .cell-cat {
      display: inline-block; padding: 0 5px;
      border-radius: 2px; color: white;
      font-size: 9px; font-weight: 700;
      margin-left: 3px;
    }
    .caveat {
      margin-top: 4px;
      padding: 3px 5px;
      background: rgba(0, 0, 0, 0.35);
      border-left: 2px solid var(--blue);
      border-radius: 2px;
      font-size: 10px;
      color: var(--text);
    }
    .empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
      padding: 4px 0;
    }
    .err { color: var(--cat-ifr); font-size: 12px; }
  </style>
</head>
<body>

<header>
  <img src="/static/soonstone.svg" alt="Soonstone">
  <h1>Soon<span class="accent">stone</span></h1>
  <span class="tagline">forecast verification &middot; <span id="station-count">…</span> stations</span>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const CAT_COLOR = {
  VFR: "#3fb950", MVFR: "#58a6ff", IFR: "#ff7b7b", LIFR: "#d093ff"
};
const CAT_BG = (cat) => CAT_COLOR[cat] || "#cbd5e1"; /* slate-300 for unknown on dark */

const map = L.map("map", { zoomControl: true }).setView([39.5, -98.5], 4);

const baseLayers = {
  "Dark": L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { attribution: '&copy; OSM &copy; CARTO', subdomains: "abcd", maxZoom: 19 }
  ),
  "Streets": L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }
  ),
};
baseLayers["Dark"].addTo(map);

// FAA VFR sectional tiles only exist at zoom >= 8 (no continental composite,
// only chart-scale segments). Modeled as an overlay on top of the dark base
// so zooming out doesn't blank the map.
const vfrLayer = L.tileLayer(
  "https://tiles.arcgis.com/tiles/ssFJjBXIUyZDrSYZ/arcgis/rest/services/VFR_Sectional/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: 'VFR charts &copy; FAA',
    minZoom: 8,
    maxZoom: 18,
    maxNativeZoom: 11,
    opacity: 0.85,
  }
);

/* RainViewer animated overlays (radar + satellite). Preload last hour of
   frames and cycle.

   Default off; user toggles via the layer control. When enabled, fetches
   RainViewer's manifest, takes the last 12 past frames (~60 min @ 5-min
   spacing), preloads each as its own L.tileLayer with opacity 0, then
   cycles which one is at opacity (radar 0.6, satellite 0.5) every 700 ms.
   A small HUD at the bottom-left shows the current frame's timestamp and
   a play/pause. The manifest is re-fetched every 5 min and both frame
   stacks rebuilt. Tiles are 512 px (matches RainViewer's website quality
   on retina) with maxNativeZoom 14 -- crisp through the chart-overlap
   range. */

const RV_FRAME_COUNT      = 12;
const RV_FRAME_INTERVAL   = 700;
const RV_REFRESH_INTERVAL = 5 * 60 * 1000;
const RV_RADAR_OPACITY    = 0.6;
const RV_SATELLITE_OPACITY = 0.5;
const RV_TILE_SIZE        = 512;
/* RainViewer URL options: /{size}/{z}/{x}/{y}/{color}/{smooth}_{snow}.png
   color 2  = "Original BR" radar palette
   color 0  = satellite IR color
   1_1      = smoothing on, snow rendered distinctly                       */
const RV_RADAR_OPTS    = "2/1_1.png";
const RV_SATELLITE_OPTS = "0/0_0.png";

let rvFrames = [];
let rvSatFrames = [];
let rvCurrentIdx = 0;
let rvAnimTimer = null;
let rvRefreshTimer = null;
let rvPaused = false;
let rvHud = null;
let rvRadarOn = false;
let rvSatelliteOn = false;

async function rvRebuild() {
  let manifest;
  try {
    const r = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    manifest = await r.json();
  } catch (_) { return; }

  const past = (manifest.radar && manifest.radar.past) || [];
  const sat  = (manifest.satellite && manifest.satellite.infrared) || [];

  // Tear down both stacks.
  for (const layer of rvFrames) if (map.hasLayer(layer)) map.removeLayer(layer);
  for (const layer of rvSatFrames) if (map.hasLayer(layer)) map.removeLayer(layer);
  rvFrames = [];
  rvSatFrames = [];

  if (rvRadarOn) {
    for (const frame of past.slice(-RV_FRAME_COUNT)) {
      const url = `${manifest.host}${frame.path}/${RV_TILE_SIZE}/{z}/{x}/{y}/${RV_RADAR_OPTS}`;
      const layer = L.tileLayer(url, {
        opacity: 0,
        attribution: 'Radar &copy; <a href="https://www.rainviewer.com/">RainViewer</a>',
        maxZoom: 18,
        maxNativeZoom: 14,
        tileSize: RV_TILE_SIZE,
        zoomOffset: -1,  /* required when tileSize=512 to keep zoom math right */
      });
      layer._rvTimestamp = frame.time;
      layer.addTo(map);
      rvFrames.push(layer);
    }
  }

  if (rvSatelliteOn) {
    for (const frame of sat.slice(-RV_FRAME_COUNT)) {
      const url = `${manifest.host}${frame.path}/${RV_TILE_SIZE}/{z}/{x}/{y}/${RV_SATELLITE_OPTS}`;
      const layer = L.tileLayer(url, {
        opacity: 0,
        attribution: 'Satellite &copy; <a href="https://www.rainviewer.com/">RainViewer</a>',
        maxZoom: 18,
        maxNativeZoom: 8,  /* satellite tiles much coarser than radar */
        tileSize: RV_TILE_SIZE,
        zoomOffset: -1,
      });
      layer._rvTimestamp = frame.time;
      layer.addTo(map);
      rvSatFrames.push(layer);
    }
  }

  const visibleStack = rvFrames.length ? rvFrames : rvSatFrames;
  rvCurrentIdx = Math.max(0, visibleStack.length - 1);
  rvShowFrame(rvCurrentIdx);
}

function rvShowFrame(idx) {
  /* Radar frames have their own timeline; satellite frames have their own
     timeline (cadences differ). For the cycler we use the LONGER stack as
     the primary timeline; the other stack picks its closest-matching frame
     by timestamp. The HUD shows the primary timeline's current timestamp. */
  const primary = rvFrames.length >= rvSatFrames.length ? rvFrames : rvSatFrames;
  if (!primary.length) return;
  const primaryFrame = primary[idx];
  const primaryTs = primaryFrame._rvTimestamp;

  for (let i = 0; i < rvFrames.length; i++) {
    rvFrames[i].setOpacity(i === idx && primary === rvFrames ? RV_RADAR_OPACITY : 0);
  }
  if (primary === rvSatFrames) {
    /* Pick the radar frame whose timestamp is closest to the primary's. */
    const matchIdx = _rvClosestIdx(rvFrames, primaryTs);
    if (matchIdx !== -1) rvFrames[matchIdx].setOpacity(RV_RADAR_OPACITY);
  }

  for (let i = 0; i < rvSatFrames.length; i++) {
    rvSatFrames[i].setOpacity(i === idx && primary === rvSatFrames ? RV_SATELLITE_OPACITY : 0);
  }
  if (primary === rvFrames) {
    const matchIdx = _rvClosestIdx(rvSatFrames, primaryTs);
    if (matchIdx !== -1) rvSatFrames[matchIdx].setOpacity(RV_SATELLITE_OPACITY);
  }

  if (rvHud) rvHud._update(primaryTs);
}

function _rvClosestIdx(stack, ts) {
  if (!stack.length) return -1;
  let best = 0, bestDiff = Math.abs(stack[0]._rvTimestamp - ts);
  for (let i = 1; i < stack.length; i++) {
    const d = Math.abs(stack[i]._rvTimestamp - ts);
    if (d < bestDiff) { best = i; bestDiff = d; }
  }
  return best;
}

function rvTick() {
  if (rvPaused) return;
  const primary = rvFrames.length >= rvSatFrames.length ? rvFrames : rvSatFrames;
  if (!primary.length) return;
  rvCurrentIdx = (rvCurrentIdx + 1) % primary.length;
  rvShowFrame(rvCurrentIdx);
}

const RvHudControl = L.Control.extend({
  options: { position: "bottomleft" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "rv-hud");
    div.innerHTML = `<button id="rv-toggle" title="play/pause">&#9208;</button><span id="rv-time">…</span>`;
    L.DomEvent.disableClickPropagation(div);
    div.querySelector("#rv-toggle").addEventListener("click", () => {
      rvPaused = !rvPaused;
      div.querySelector("#rv-toggle").innerHTML = rvPaused ? "&#9654;" : "&#9208;";
    });
    return div;
  },
  _update: function (epochSec) {
    const dt = new Date(epochSec * 1000);
    const local = dt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    const utc =
      String(dt.getUTCHours()).padStart(2, "0") + ":" +
      String(dt.getUTCMinutes()).padStart(2, "0");
    const span = document.getElementById("rv-time");
    if (span) span.textContent = `${local} (${utc} UTC)`;
  },
});

const placeholderLayer = L.layerGroup();

/* AIRMET/SIGMET overlay -- empty L.geoJSON, populated lazily on enable. */
const HAZARD_STYLES = {
  CONVECTIVE:  { color: "#dc2626", fillColor: "#dc2626", weight: 2,   fillOpacity: 0.22, dashArray: "6,4" },
  TURB:        { color: "#f97316", fillColor: "#f97316", weight: 2,   fillOpacity: 0.18 },
  ICE:         { color: "#a855f7", fillColor: "#a855f7", weight: 2,   fillOpacity: 0.18 },
  IFR:         { color: "#3b82f6", fillColor: "#3b82f6", weight: 1.5, fillOpacity: 0.18 },
  "MTN OBSCN": { color: "#a16207", fillColor: "#a16207", weight: 1.5, fillOpacity: 0.18, dashArray: "4,3" },
  ASH:         { color: "#525252", fillColor: "#525252", weight: 2,   fillOpacity: 0.30 },
};

/* AWC returns severity as either a numeric 0-6 (airsigmet endpoint) or as
   the string code 'NONE'/'MOD'/'SEV'. Normalize both. */
function severityBucket(s) {
  if (s == null) return null;
  if (typeof s === "string") {
    if (s === "SEV") return "SEV";
    if (s === "MOD") return "MOD";
    return null;
  }
  if (s >= 4) return "SEV";
  if (s >= 2) return "MOD";
  return null;
}

function styleForHazard(hazard, severity) {
  const base = HAZARD_STYLES[hazard] || {
    color: "#94a3b8", fillColor: "#94a3b8", weight: 1.5, fillOpacity: 0.15,
  };
  const bucket = severityBucket(severity);
  if (bucket === "SEV") return { ...base, weight: base.weight + 1 };
  if (bucket === "MOD" && !base.dashArray) return { ...base, dashArray: "3,3" };
  return base;
}

function escapeHtml(s) {
  return (s || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function isoFromAwcTimestring(s) {
  // AWC's airsigmet validTimeFrom is like '2026-05-03T13:00:00Z' or
  // '2026-05-03 13:00:00' depending on endpoint. Normalize.
  if (!s) return null;
  let t = s;
  if (t.includes(" ") && !t.includes("T")) t = t.replace(" ", "T");
  if (!t.endsWith("Z") && !t.match(/[+-]\d\d:?\d\d$/)) t += "Z";
  return t;
}

function airsigmetPopup(feature) {
  const p = feature.properties || {};
  const head = `${p.airSigmetType || "BULLETIN"}: ${p.hazard || ""}`;
  const bucket = severityBucket(p.severity);
  const sev = bucket ? ` &middot; ${bucket}` : "";
  const fromIso = isoFromAwcTimestring(p.validTimeFrom);
  const toIso = isoFromAwcTimestring(p.validTimeTo);
  const valid = (fromIso && toIso) ? fmtTimeRange(fromIso, toIso) : "—";
  const raw = escapeHtml(p.rawAirSigmet || "").replace(/\n/g, "<br>");
  return `
    <div class="popup-station">${head}${sev}</div>
    <div class="popup-section-label">Valid</div>
    <div>${valid}</div>
    ${raw ? `<div class="popup-section-label">Bulletin</div><pre style="font-size:10px;white-space:pre-wrap;line-height:1.3;color:var(--text-muted)">${raw}</pre>` : ""}
  `;
}

const airsigmetsLayer = L.geoJSON(null, {
  style: (f) => styleForHazard(f.properties.hazard, f.properties.severity),
  onEachFeature: (feature, layer) => {
    layer.bindPopup(airsigmetPopup(feature));
  },
});

let airsigmetsRefreshTimer = null;
const AIRSIG_REFRESH_MS = 5 * 60 * 1000;

async function refreshAirsigmets() {
  try {
    const r = await fetch("/api/airsigmets");
    const fc = await r.json();
    airsigmetsLayer.clearLayers();
    airsigmetsLayer.addData(fc);
  } catch (_) { /* ignore; current overlay stays */ }
}

const radarPlaceholder = L.layerGroup();
const satellitePlaceholder = L.layerGroup();
const overlays = {
  "VFR Sectional (zoom in past 8)": vfrLayer,
  "Hazards (AIRMET/SIGMET)": airsigmetsLayer,
  "Live radar (RainViewer)": radarPlaceholder,
  "Cloud cover (RainViewer satellite)": satellitePlaceholder,
};

async function rvEnsureStarted() {
  if (!rvHud) {
    rvHud = new RvHudControl();
    rvHud.addTo(map);
    rvPaused = false;
  }
  await rvRebuild();
  if (!rvAnimTimer) rvAnimTimer = setInterval(rvTick, RV_FRAME_INTERVAL);
  if (!rvRefreshTimer) rvRefreshTimer = setInterval(rvRebuild, RV_REFRESH_INTERVAL);
}

function rvMaybeStop() {
  if (rvRadarOn || rvSatelliteOn) return;
  if (rvHud) { map.removeControl(rvHud); rvHud = null; }
  if (rvAnimTimer) { clearInterval(rvAnimTimer); rvAnimTimer = null; }
  if (rvRefreshTimer) { clearInterval(rvRefreshTimer); rvRefreshTimer = null; }
  for (const l of rvFrames) if (map.hasLayer(l)) map.removeLayer(l);
  for (const l of rvSatFrames) if (map.hasLayer(l)) map.removeLayer(l);
  rvFrames = [];
  rvSatFrames = [];
}

map.on("overlayadd", async (e) => {
  if (e.name === "Hazards (AIRMET/SIGMET)") {
    await refreshAirsigmets();
    if (!airsigmetsRefreshTimer) {
      airsigmetsRefreshTimer = setInterval(refreshAirsigmets, AIRSIG_REFRESH_MS);
    }
    return;
  }
  if (e.name === "Live radar (RainViewer)") {
    rvRadarOn = true;
    await rvEnsureStarted();
    return;
  }
  if (e.name === "Cloud cover (RainViewer satellite)") {
    rvSatelliteOn = true;
    await rvEnsureStarted();
    return;
  }
});

map.on("overlayremove", async (e) => {
  if (e.name === "Hazards (AIRMET/SIGMET)") {
    if (airsigmetsRefreshTimer) {
      clearInterval(airsigmetsRefreshTimer);
      airsigmetsRefreshTimer = null;
    }
    return;
  }
  if (e.name === "Live radar (RainViewer)") {
    rvRadarOn = false;
    if (rvSatelliteOn) await rvRebuild();  /* re-render without radar */
    rvMaybeStop();
    return;
  }
  if (e.name === "Cloud cover (RainViewer satellite)") {
    rvSatelliteOn = false;
    if (rvRadarOn) await rvRebuild();
    rvMaybeStop();
    return;
  }
});

L.control.layers(baseLayers, overlays, { position: "topright", collapsed: false }).addTo(map);

const legend = L.control({ position: "bottomright" });
legend.onAdd = function() {
  const div = L.DomUtil.create("div", "legend");
  div.innerHTML = `
    <div class="legend-title">Flight category</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.VFR}"></span>VFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.MVFR}"></span>MVFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.IFR}"></span>IFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.LIFR}"></span>LIFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:#cbd5e1"></span>no data</div>
  `;
  return div;
};
legend.addTo(map);

/* ─── Decoders: aviation jargon → plain English ─────────────────── */

const COMPASS = ["N","NNE","NE","ENE","E","ESE","SE","SSE",
                 "S","SSW","SW","WSW","W","WNW","NW","NNW"];

function compass(deg) {
  if (deg == null) return null;
  return COMPASS[Math.round(((deg % 360) / 22.5)) % 16];
}

const FLIGHT_CAT_LABEL = {
  VFR:  { name: "VFR",  desc: "Clear, good for flight" },
  MVFR: { name: "MVFR", desc: "Marginal — reduced visibility or low clouds" },
  IFR:  { name: "IFR",  desc: "Instrument conditions — poor visibility or low ceiling" },
  LIFR: { name: "LIFR", desc: "Low instrument — very poor conditions" },
};

const CLOUD_COVER = {
  SKC: "sky clear", CLR: "clear",
  FEW: "few clouds", SCT: "scattered clouds",
  BKN: "broken clouds", OVC: "overcast",
  VV: "vertical visibility limited to",
};

const CLOUD_TYPE = { CB: "cumulonimbus (thunderstorm)", TCU: "towering cumulus" };

const WX_INTENSITY  = { "+": "heavy ", "-": "light ", "VC": "nearby " };
const WX_DESCRIPTOR = {
  MI: "shallow ", PR: "partial ", BC: "patchy ", DR: "drifting ",
  BL: "blowing ", SH: "showers of ", TS: "thunderstorm with ", FZ: "freezing ",
};
const WX_PRECIP = {
  DZ: "drizzle", RA: "rain", SN: "snow", SG: "snow grains",
  IC: "ice crystals", PL: "ice pellets", GR: "hail",
  GS: "small hail", UP: "unknown precipitation",
};
const WX_OBSCURE = {
  BR: "mist", FG: "fog", FU: "smoke", VA: "volcanic ash",
  DU: "dust", SA: "sand", HZ: "haze",
};
const WX_OTHER = {
  PO: "dust whirls", SQ: "squall", FC: "funnel cloud",
  SS: "sandstorm", DS: "duststorm",
};
function decodeWeatherToken(tok) {
  let i = 0, out = "";
  if (tok[0] === "+" || tok[0] === "-") { out += WX_INTENSITY[tok[0]]; i++; }
  else if (tok.startsWith("VC")) { out += WX_INTENSITY["VC"]; i += 2; }
  while (i < tok.length) {
    const two = tok.substring(i, i + 2);
    const map = WX_DESCRIPTOR[two] || WX_PRECIP[two] || WX_OBSCURE[two] || WX_OTHER[two];
    if (map) { out += map; i += 2; }
    else { out += tok[i]; i++; }
  }
  return out.trim();
}

const GROUP_LABEL = {
  BASE:   "Base forecast",
  FM:     "From",
  BECMG:  "Becoming",
  TEMPO:  "Temporarily",
  PROB30: "30% chance",
  PROB40: "40% chance",
};

const AMEND_LABEL = { AMD: "Amended", COR: "Corrected", RTD: "Routine delayed" };

/* ─── Formatters: render decoded values for display ─────────────── */

function fmtWind(d) {
  if (d.wind_speed_kt == null || d.wind_speed_kt === 0) return "Calm";
  const dir = d.wind_dir_deg == null ? "Variable" : compass(d.wind_dir_deg);
  const spd = Math.round(d.wind_speed_kt);
  let s = `${dir} ${spd} kt`;
  if (d.wind_gust_kt) s += ` gust ${Math.round(d.wind_gust_kt)}`;
  return s;
}

function fmtVis(v) {
  if (v == null) return "—";
  if (v >= 10) return "10+ mi";
  if (v >= 6) return "6+ mi";
  if (v >= 3) return `${v} mi`;
  if (v >= 1) return `${v} mi (low)`;
  return `${v} mi (very low)`;
}

function fmtCeiling(c) {
  return c == null ? "no ceiling reported" : `cloud base ${c.toLocaleString()} ft`;
}

function fmtClouds(layersJson) {
  if (!layersJson) return null;
  let layers;
  try { layers = JSON.parse(layersJson); } catch { return null; }
  if (!layers || !layers.length) return null;
  return layers.map(l => {
    const cover = CLOUD_COVER[l.cover] || l.cover;
    if (l.base_ft == null) return cover;
    const ct = CLOUD_TYPE[l.type] ? ` ${CLOUD_TYPE[l.type]}` : "";
    return `${cover} at ${l.base_ft.toLocaleString()} ft${ct}`;
  }).join(", ");
}

function fmtWeather(weatherJson) {
  if (!weatherJson) return null;
  let arr;
  try { arr = JSON.parse(weatherJson); } catch { return null; }
  if (!arr || !arr.length) return null;
  return arr.map(decodeWeatherToken).join(", ");
}

function fmtLeadAgo(h) {
  if (h == null) return "";
  if (h < 1) return `${Math.round(h * 60)} min ago`;
  if (h < 2) return `${h.toFixed(1)} h ago`;
  return `${Math.round(h)} h ago`;
}

function fmtLeadFwd(h) {
  if (h == null) return "";
  if (h < 0) {
    const a = Math.abs(h);
    if (a < 1) return `${Math.round(a * 60)} min ago`;
    return `${a.toFixed(1)} h ago`;
  }
  if (h < 1) return `in ${Math.round(h * 60)} min`;
  if (h < 24) return `in ${h.toFixed(1)} h`;
  return `in ${Math.round(h)} h`;
}

function fmtTime(iso) {
  // Local time first, UTC in parens. Local = browser timezone.
  const d = new Date(iso);
  const local = d.toLocaleTimeString([], {
    hour: "numeric", minute: "2-digit", timeZoneName: "short"
  });
  const utc = iso.slice(11, 16) + " UTC";
  return `${local} (${utc})`;
}

function fmtTimeRange(fromIso, toIso) {
  // Local-local with one timezone label, then UTC range in parens.
  const f = new Date(fromIso);
  const t = new Date(toIso);
  const opts = { hour: "numeric", minute: "2-digit" };
  const fLocal = f.toLocaleTimeString([], opts);
  const tLocal = t.toLocaleTimeString([], { ...opts, timeZoneName: "short" });
  const fUtc = fromIso.slice(11, 16);
  const tUtc = toIso.slice(11, 16);
  return `${fLocal}–${tLocal} (${fUtc}–${tUtc} UTC)`;
}

function fmtCatBadge(cat) {
  if (!cat) return "";
  return `<span class="cell-cat" style="background:${CAT_BG(cat)}" title="${(FLIGHT_CAT_LABEL[cat] || {}).desc || ""}">${cat}</span>`;
}

/* ─── Render functions ──────────────────────────────────────────── */

function nowBlock(now) {
  if (!now) return `<div class="empty">no recent observation</div>`;
  const cat = FLIGHT_CAT_LABEL[now.flight_category];
  const wx = fmtWeather(now.weather);
  const clouds = fmtClouds(now.cloud_layers);
  const wxLine = wx ? `<div>Weather: ${wx}</div>` : "";
  const cloudLine = clouds ? `<div>${clouds}</div>` : "";
  return `
    <div class="popup-now">
      <div><strong>At ${fmtTime(now.observed_at)}</strong> &middot; ${now.metar_type === "SPECI" ? "Special observation" : "Observation"}</div>
      <div>${fmtWind(now)}</div>
      <div>Visibility ${fmtVis(now.visibility_sm)} &middot; ${fmtCeiling(now.ceiling_ft)}</div>
      ${cloudLine}
      ${wxLine}
      <div style="margin-top:4px">
        <span class="popup-now-cat" style="background:${CAT_BG(now.flight_category)}">${now.flight_category || "—"}</span>
        ${cat ? `<span style="margin-left:6px;color:var(--text-muted)">${cat.desc}</span>` : ""}
      </div>
    </div>`;
}

function caveatBlock(cav) {
  const head = cav.probability_pct ? `${cav.probability_pct}% chance` : "Temporarily";
  const wx = fmtWeather(cav.weather);
  const clouds = fmtClouds(cav.cloud_layers);
  const parts = [`<strong>${head}</strong> ${fmtTimeRange(cav.group_from, cav.group_to)}`];
  parts.push(`${fmtWind(cav)} &middot; visibility ${fmtVis(cav.visibility_sm)}`);
  if (clouds) parts.push(clouds);
  if (wx) parts.push(`Weather: ${wx}`);
  if (cav.flight_category) parts.push(fmtCatBadge(cav.flight_category));
  return `<div class="caveat">${parts.map(p => `<div>${p}</div>`).join("")}</div>`;
}

function convergenceCell(c, observedCat) {
  const diverged = observedCat && c.flight_category && c.flight_category !== observedCat;
  const cls = `cell ${c.amendment_type ? "amend" : ""} ${diverged ? "diverged" : ""}`.trim();
  const amendLabel = c.amendment_type
    ? `<div style="font-weight:700;color:#fbbf24" title="${AMEND_LABEL[c.amendment_type] || ""}">${c.amendment_type}</div>`
    : "";
  return `
    <div class="${cls}">
      ${amendLabel}
      <div class="cell-time">${fmtTime(c.issued_at)}</div>
      <div>${fmtLeadAgo(c.lead_hours)}</div>
      <div>${fmtWind(c)}</div>
      <div>vis ${fmtVis(c.visibility_sm)}</div>
      <div>${fmtCatBadge(c.flight_category)}</div>
    </div>`;
}

function forwardCellNws(f) {
  const lead = fmtLeadFwd(f.lead_hours);
  const popLine = f.pop_pct != null
    ? `<div>${f.pop_pct}% chance of precip</div>`
    : "";
  const tempLine = f.temperature_f != null
    ? `<div>${f.temperature_f}&deg;F</div>`
    : "";
  const windLine = (f.wind_dir || f.wind_speed)
    ? `<div>${f.wind_dir || ""} ${f.wind_speed || ""}</div>`
    : "";
  return `
    <div class="cell nws" title="NWS public 12h forecast">
      <div class="cell-time">NWS &middot; ${f.period_name || ""}</div>
      <div>${fmtTime(f.valid_at)} &middot; ${lead}</div>
      ${windLine}
      ${tempLine}
      ${popLine}
      <div style="font-style:italic">${f.short_forecast || ""}</div>
    </div>`;
}

function forwardCell(f) {
  if (f.forecast_source === "NWS") return forwardCellNws(f);
  const cls = `cell ${f.group_type === "TEMPO" ? "tempo" : ""} ${(f.group_type || "").startsWith("PROB") ? "prob" : ""}`.trim();
  const label = GROUP_LABEL[f.group_type] || f.group_type;
  const lead = fmtLeadFwd(f.lead_hours);
  const clouds = fmtClouds(f.cloud_layers);
  const wx = fmtWeather(f.weather);
  const wxLine = wx ? `<div style="font-style:italic">${wx}</div>` : "";
  const caveats = (f.caveats || []).map(caveatBlock).join("");
  return `
    <div class="${cls}">
      <div class="cell-time">${label}</div>
      <div>${fmtTime(f.valid_at)} &middot; ${lead}</div>
      <div>${fmtWind(f)}</div>
      <div>vis ${fmtVis(f.visibility_sm)}</div>
      <div>${fmtCeiling(f.ceiling_ft)}</div>
      ${wxLine}
      <div>${fmtCatBadge(f.flight_category)}</div>
      ${caveats}
    </div>`;
}

function popupHtml(snap) {
  const observedCat = snap.now ? snap.now.flight_category : null;
  const convStrip = snap.convergence.length
    ? `<div class="strip">${snap.convergence.map(c => convergenceCell(c, observedCat)).join("")}</div>`
    : `<div class="empty">no TAF in last 24h</div>`;
  const fwdStrip = snap.forward.length
    ? `<div class="strip">${snap.forward.map(forwardCell).join("")}</div>`
    : `<div class="empty">no active TAF</div>`;
  const name = snap.station.name ? `<span class="station-name">${snap.station.name}</span>` : "";
  return `
    <div class="popup-station">${snap.station.id}${name}</div>
    <div class="popup-section-label">Now</div>
    ${nowBlock(snap.now)}
    <div class="popup-section-label">Convergence (last 24h)</div>
    ${convStrip}
    <div class="popup-section-label">Forward forecast</div>
    ${fwdStrip}
  `;
}

async function loadSnapshot(stationId, marker) {
  marker.bindPopup(`<div class="empty">loading ${stationId}…</div>`).openPopup();
  try {
    const resp = await fetch(`/api/stations/${stationId}/snapshot`);
    if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
    const snap = await resp.json();
    marker.setPopupContent(popupHtml(snap));
  } catch (e) {
    marker.setPopupContent(`<div class="err">error: ${e.message}</div>`);
  }
}

async function init() {
  const resp = await fetch("/api/stations");
  const fc = await resp.json();
  document.getElementById("station-count").textContent = fc.features.length;
  for (const feat of fc.features) {
    const [lon, lat] = feat.geometry.coordinates;
    const cat = feat.properties.flight_category;
    const marker = L.circleMarker([lat, lon], {
      radius: 6,
      fillColor: CAT_BG(cat),
      color: "#0f172a",     /* slate-900 hairline ring for definition */
      weight: 0.8,
      fillOpacity: 0.95,
    }).addTo(map);
    marker.on("click", () => loadSnapshot(feat.properties.id, marker));
    marker.bindTooltip(`${feat.properties.id}${cat ? " (" + cat + ")" : ""}`);
  }
}

init();
</script>
