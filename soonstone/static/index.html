<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soonstone — Forecast Verification</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .legend {
      background: rgba(255,255,255,0.95); padding: 6px 10px; border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); font-size: 12px; line-height: 1.6;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .leaflet-popup-content { margin: 8px 10px; min-width: 320px; max-width: 480px; }
    .popup-station { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .popup-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin: 8px 0 4px; }
    .popup-now { padding: 6px 8px; background: #f5f5f5; border-radius: 4px; font-size: 12px; }
    .popup-now-cat { display: inline-block; padding: 1px 6px; border-radius: 3px; color: white; font-weight: 600; font-size: 10px; }
    .strip { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
    .cell { flex: 0 0 auto; min-width: 90px; padding: 4px 6px; background: #f5f5f5; border-radius: 4px; font-size: 11px; line-height: 1.3; border: 1px solid transparent; }
    .cell.amend { background: #fff4d6; border-color: #e0b400; }
    .cell.diverged { border-color: #d33; }
    .cell.tempo { background: #e8e8ff; }
    .cell.prob { background: #f0e8ff; }
    .cell-time { font-weight: 600; }
    .cell-cat { display: inline-block; padding: 0 4px; border-radius: 2px; color: white; font-size: 9px; font-weight: 600; }
    .caveat { margin-top: 3px; padding: 2px 4px; border-left: 2px solid #88a; font-size: 10px; color: #444; }
    .empty { color: #999; font-style: italic; font-size: 12px; }
    .err { color: #c00; font-size: 12px; }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const CAT_COLOR = {
  VFR: "#2ca02c", MVFR: "#1f77b4", IFR: "#d62728", LIFR: "#9467bd"
};
const CAT_BG = (cat) => CAT_COLOR[cat] || "#888";

const map = L.map("map").setView([27.5, -83.5], 6);
L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: "abcd",
    maxZoom: 19,
  }
).addTo(map);

const legend = L.control({ position: "bottomright" });
legend.onAdd = function() {
  const div = L.DomUtil.create("div", "legend");
  div.innerHTML = `
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.VFR}"></span>VFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.MVFR}"></span>MVFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.IFR}"></span>IFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:${CAT_COLOR.LIFR}"></span>LIFR</div>
    <div class="legend-row"><span class="legend-dot" style="background:#888"></span>no data</div>
  `;
  return div;
};
legend.addTo(map);

function fmtWind(d) {
  if (d.wind_speed_kt == null) return "—";
  const dir = d.wind_dir_deg == null ? "VRB" : String(d.wind_dir_deg).padStart(3, "0");
  const spd = Math.round(d.wind_speed_kt);
  const gust = d.wind_gust_kt ? `G${Math.round(d.wind_gust_kt)}` : "";
  return `${dir}/${spd}${gust}`;
}

function fmtVis(v) {
  if (v == null) return "—";
  return v >= 6 ? "6+SM" : `${v}SM`;
}

function fmtCeiling(c) {
  return c == null ? "—" : `${c.toLocaleString()}ft`;
}

function fmtLead(h) {
  if (h == null) return "";
  if (Math.abs(h) < 1) return `${Math.round(h * 60)}min`;
  return `${h.toFixed(1)}h`;
}

function isoToHHMM(iso) {
  return iso.slice(11, 16) + "Z";
}

function catBadge(cat) {
  if (!cat) return "";
  return `<span class="cell-cat" style="background:${CAT_BG(cat)}">${cat}</span>`;
}

function nowBlock(now) {
  if (!now) return `<div class="empty">no recent observation</div>`;
  return `
    <div class="popup-now">
      <div><strong>${isoToHHMM(now.observed_at)}</strong> &middot; ${now.metar_type || "METAR"}</div>
      <div>${fmtWind(now)} &middot; ${fmtVis(now.visibility_sm)} &middot; ceiling ${fmtCeiling(now.ceiling_ft)}
        &nbsp; <span class="popup-now-cat" style="background:${CAT_BG(now.flight_category)}">${now.flight_category || "—"}</span>
      </div>
    </div>`;
}

function caveatBlock(cav) {
  const prob = cav.probability_pct ? `PROB${cav.probability_pct}` : "TEMPO";
  return `<div class="caveat">${prob} ${isoToHHMM(cav.group_from)}-${isoToHHMM(cav.group_to)}: ${fmtWind(cav)} &middot; ${fmtVis(cav.visibility_sm)} ${catBadge(cav.flight_category)}</div>`;
}

function convergenceCell(c, observedCat) {
  const diverged = observedCat && c.flight_category && c.flight_category !== observedCat;
  const cls = `cell ${c.amendment_type ? "amend" : ""} ${diverged ? "diverged" : ""}`.trim();
  const tag = c.amendment_type ? `<span style="font-weight:600">${c.amendment_type}</span> ` : "";
  return `
    <div class="${cls}">
      <div class="cell-time">${tag}${isoToHHMM(c.issued_at)}</div>
      <div>${fmtLead(c.lead_hours)} ago</div>
      <div>${fmtWind(c)} ${catBadge(c.flight_category)}</div>
      <div>${fmtVis(c.visibility_sm)}</div>
    </div>`;
}

function forwardCell(f) {
  const cls = `cell ${f.group_type === "TEMPO" ? "tempo" : ""} ${(f.group_type || "").startsWith("PROB") ? "prob" : ""}`.trim();
  const lead = f.lead_hours == null ? "" : (f.lead_hours < 0 ? `${Math.abs(f.lead_hours).toFixed(1)}h ago` : `+${f.lead_hours.toFixed(1)}h`);
  const probTag = f.probability_pct ? ` (${f.probability_pct}%)` : "";
  const caveats = (f.caveats || []).map(caveatBlock).join("");
  return `
    <div class="${cls}">
      <div class="cell-time">${f.group_type}${probTag}</div>
      <div>${isoToHHMM(f.valid_at)} &middot; ${lead}</div>
      <div>${fmtWind(f)} ${catBadge(f.flight_category)}</div>
      <div>${fmtVis(f.visibility_sm)} &middot; ${fmtCeiling(f.ceiling_ft)}</div>
      ${caveats}
    </div>`;
}

function popupHtml(snap) {
  const observedCat = snap.now ? snap.now.flight_category : null;
  const convStrip = snap.convergence.length
    ? `<div class="strip">${snap.convergence.map(c => convergenceCell(c, observedCat)).join("")}</div>`
    : `<div class="empty">no TAF in last 24h</div>`;
  const fwdStrip = snap.forward.length
    ? `<div class="strip">${snap.forward.map(forwardCell).join("")}</div>`
    : `<div class="empty">no active TAF</div>`;
  return `
    <div class="popup-station">${snap.station.id} &middot; ${snap.station.name || ""}</div>
    <div class="popup-section-label">Now</div>
    ${nowBlock(snap.now)}
    <div class="popup-section-label">Convergence (last 24h)</div>
    ${convStrip}
    <div class="popup-section-label">Forward forecast</div>
    ${fwdStrip}
  `;
}

async function loadSnapshot(stationId, marker) {
  marker.bindPopup(`<div class="empty">loading ${stationId}...</div>`).openPopup();
  try {
    const resp = await fetch(`/api/stations/${stationId}/snapshot`);
    if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
    const snap = await resp.json();
    marker.setPopupContent(popupHtml(snap));
  } catch (e) {
    marker.setPopupContent(`<div class="err">error: ${e.message}</div>`);
  }
}

async function init() {
  const resp = await fetch("/api/stations");
  const fc = await resp.json();
  for (const feat of fc.features) {
    const [lon, lat] = feat.geometry.coordinates;
    const cat = feat.properties.flight_category;
    const marker = L.circleMarker([lat, lon], {
      radius: 6,
      fillColor: CAT_BG(cat),
      color: "#222",
      weight: 1,
      fillOpacity: 0.85,
    }).addTo(map);
    marker.on("click", () => loadSnapshot(feat.properties.id, marker));
    marker.bindTooltip(`${feat.properties.id}${cat ? " (" + cat + ")" : ""}`);
  }
}

init();
</script>
</body>
</html>
