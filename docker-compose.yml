services:
  soonstone:
    build: .
    container_name: soonstone
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./data:/data
      - ./logs:/var/log/soonstone
    environment:
      - DATABASE_URL=sqlite:////data/soonstone.db
      - TZ=UTC
      - SOONSTONE_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
